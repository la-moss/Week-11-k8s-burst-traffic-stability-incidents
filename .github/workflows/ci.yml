name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: challenge1
            overlay: manifests/overlays/challenge1
            profile: profile1
          - name: challenge2
            overlay: manifests/overlays/challenge2
            profile: profile2
          - name: challenge3
            overlay: manifests/overlays/challenge3
            profile: profile3
          - name: challenge4
            overlay: manifests/overlays/challenge4
            profile: profile4
    steps:
      - uses: actions/checkout@v4

      - name: Install kind and kubectl
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Create cluster
        run: kind create cluster --name week1-k8s --config kind/kind-config.yaml

      - name: Deploy
        run: kubectl apply -k ${{ matrix.overlay }}

      - name: Wait for rollout
        run: |
          kubectl -n incident-lab rollout status deploy/worker --timeout=180s
          kubectl -n incident-lab rollout status deploy/api --timeout=180s

      - name: Verify
        run: VERIFY_PROFILE=${{ matrix.profile }} bash scripts/verify/verify.sh

      - name: Cleanup
        if: always()
        run: kind delete cluster --name week1-k8s
